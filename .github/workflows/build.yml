name: Build And Snapshot Publish

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      XCORE_USERNAME: ${{ secrets.XCORE_USERNAME }}
      XCORE_PASSWORD: ${{ secrets.XCORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Resolve snapshot version
        if: github.event_name != 'pull_request'
        run: |
          VERSION=$(./gradlew :lib:getProjectVersion -q | tail -n 1)
          echo "XCORE_PUBLISH_VERSION=${VERSION}-SNAPSHOT" >> "$GITHUB_ENV"

      - name: Build and test
        if: github.event_name == 'pull_request' || env.XCORE_USERNAME == '' || env.XCORE_PASSWORD == ''
        run: ./gradlew build

      - name: Build, test and publish snapshot
        if: github.event_name != 'pull_request' && env.XCORE_USERNAME != '' && env.XCORE_PASSWORD != ''
        run: ./gradlew build :lib:publishMavenPublicationToXcoreRepositorySnapshotsRepository -PxcorePublishVersion="$XCORE_PUBLISH_VERSION"
        env:
          ORG_GRADLE_PROJECT_xcoreRepositorySnapshotsUsername: ${{ secrets.XCORE_USERNAME }}
          ORG_GRADLE_PROJECT_xcoreRepositorySnapshotsPassword: ${{ secrets.XCORE_PASSWORD }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-mindustry-libs
          path: |
            lib/build/libs/
            example-plugin/build/libs/
